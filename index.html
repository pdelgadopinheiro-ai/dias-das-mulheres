<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia das Mulheres</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Feliz Dia das Mulheres</h1>
    <p>Uma homenagem a mulher que marcou a minha vida ❤️</p>

    <button id="button-addFoto" type="button">Adicionar Fotos</button>

    <input id="fotoInput" type="file" accept="image/*" multiple hidden>
    <div id="carousel"></div>

    <button id="prev" type="button">Foto anterior</button>
    <button id="next" type="button">Próxima foto</button>
    <button id="button-playMusica" type="button">Tocar música</button>

    <div id="spotifyPlayer"></div>

    <p>Com todo o meu amor ❤️</p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
